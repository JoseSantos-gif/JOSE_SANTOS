<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR UN CUADRADO Y UN TRIÁNGULO</title>
</head>
<body>
    <h2>CREAR UN CUADRADO Y UN TRIÁNGULO</h2>
    <h1>REALIZADO: POR JOSE LUIS SANTOS SEGOVIA</h1>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // Dibujar un cuadrado
        ctx.beginPath();
        ctx.rect(50, 50, 100, 105); // x,y, ancho, alto
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.stroke();

        // Dibujar un triangulo
        ctx.beginPath();
        ctx.moveTo(250, 50); // Inicio en el vertice superir del triangulo
        ctx.lineTo(300, 150); // Vertice inferiror derecho del triangulo
        ctx.lineTo(200, 150); // Vertice inferiror izquierdo del triangulo
        ctx.closePath();
        ctx.fillStyle = "lightcoral";
        ctx.fill();
        ctx.stroke();
    </script>
</body>
</html>
