<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREAR UN CUADRADO Y UN TRIÁNGULO</title>
</head>
<body>
    <h2>CREAR UN CUADRADO Y UN TRIÁNGULO</h2>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // CUADRADO ARRIBA (centrado)
        ctx.beginPath();
        ctx.rect(200, 50, 100, 100); // centrado horizontalmente
        ctx.fillStyle = "red";
        ctx.fill();
        ctx.stroke();

        // LÍNEA EN EL CENTRO
        ctx.beginPath();
        ctx.moveTo(0, 250);
        ctx.lineTo(500, 250);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "black";
        ctx.stroke();

        // TRIÁNGULO ABAJO (centrado)
        ctx.beginPath();
        ctx.moveTo(250, 300);  // vértice superior
        ctx.lineTo(300, 400);  // inferior derecho
        ctx.lineTo(200, 400);  // inferior izquierdo
        ctx.closePath();
        ctx.fillStyle = "lightcoral";
        ctx.fill();
        ctx.stroke();
    </script>
</body>
</html>
