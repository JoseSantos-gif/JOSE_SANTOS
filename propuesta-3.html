<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Transformaciones 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.85);
    padding: 10px;
    border-radius: 8px;
    font-size: 10px;
}

#escala {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: black;
    color: lime;
    padding: 8px;
    border-radius: 5px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="info">
    <p><b>Propuesta 3</b></p>
    <h1>Aplicación integrada de traslación, rotación <br>y escalado en un objeto tridimensional</h1>
    <h3>Realizado por: Santos Segovia Jose Luis</h3>
    <b>CONTROLES</b><br><br>
    🔹 Flechas → Traslación (Posición)<br>
    🔹 Q / E → Rotación<br>
    🔹 Z / X → Escalado (tamaño)
</div>

<div id="escala">Escala: 100%</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20232a);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDER
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CUBO
const cubo = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshNormalMaterial()
);
scene.add(cubo);

// LUZ
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// CÁMARA
camera.position.z = 5;

// LÍMITES
const LIMITE = 3;
const ESCALA_MIN = 0.1; // 10%
const ESCALA_MAX = 1.0; // 100%

const textoEscala = document.getElementById("escala");

// FUNCIÓN PARA ACTUALIZAR TEXTO
function actualizarEscala() {
    const porcentaje = Math.round(cubo.scale.x * 100);
    textoEscala.textContent = "Escala: " + porcentaje + "%";
}

// CONTROLES
window.addEventListener('keydown', (event) => {

    switch(event.key) {

        // TRASLACIÓN
        case 'ArrowUp':
            cubo.position.y = Math.min(LIMITE, cubo.position.y + 0.2);
            break;

        case 'ArrowDown':
            cubo.position.y = Math.max(-LIMITE, cubo.position.y - 0.2);
            break;

        case 'ArrowLeft':
            cubo.position.x = Math.max(-LIMITE, cubo.position.x - 0.2);
            break;

        case 'ArrowRight':
            cubo.position.x = Math.min(LIMITE, cubo.position.x + 0.2);
            break;

        // ROTACIÓN
        case 'q':
        case 'Q':
            cubo.rotation.y -= 0.1;
            break;

        case 'e':
        case 'E':
            cubo.rotation.y += 0.1;
            break;

        // ESCALADO +
        case 'z':
        case 'Z':
            let nuevaEscalaUp = Math.min(ESCALA_MAX, cubo.scale.x + 0.1);
            cubo.scale.set(nuevaEscalaUp, nuevaEscalaUp, nuevaEscalaUp);
            actualizarEscala();
            break;

        // ESCALADO -
        case 'x':
        case 'X':
            let nuevaEscalaDown = Math.max(ESCALA_MIN, cubo.scale.x - 0.1);
            cubo.scale.set(nuevaEscalaDown, nuevaEscalaDown, nuevaEscalaDown);
            actualizarEscala();
            break;
    }
});

// ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
