<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3: Curva Dinámica Coseno</title>
</head>
<body>
    <h1>Tarea realizada por: SANTOS SEGOVIA JOSE LUIS</h1>
    <h2>Ejercicio 3: Curva Dinámica de la Función Coseno</h2>

    <canvas id="myCanvas" style="border: 4px solid blue;" width="600" height="400"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        var desplazamiento = 0; // para animación

        function dibujarCurva() {

            ctx.beginPath();

            // recorrer todo el ancho del canvas
            for (let x = 0; x < canvas.width; x++) {

                // convertir x a radianes
                let escalaX = (x + desplazamiento) * 0.02;

                // función coseno
                let y = Math.cos(escalaX);

                // escalar para que se vea bien en el canvas
                let yCanvas = canvas.height / 2 - y * 100;

                if (x === 0) {
                    ctx.moveTo(x, yCanvas);
                } else {
                    ctx.lineTo(x, yCanvas);
                }
            }

            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        setInterval(() => {

            // limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // dibujar eje X
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "black";
            ctx.stroke();

            // dibujar curva
            dibujarCurva();

            // mover la gráfica
            desplazamiento += 5;

        }, 100);

    </script>

</body>
</html>
