<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfico de Barras</title>
</head>
<body>

<h2>REALIZADO POR JOSE LUIS SANTOS SEGOVIA</h2>
<canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    // Datos de barras
    var datos = [250, 300, 350, 400, 450];
    var colores = ["red", "blue", "green", "orange", "purple"];
    var porcentajes = [60, 70, 80, 90, 100];

    // dibujar barras
    var x = 50; //posicion inicial en x
    var width = 50; //ancho de cada barra

    //configuracion del texto
    ctx.font = "14px Arial";
    ctx.fillStyle = "black";
    ctx.textAlign = "center";

    for(var i = 0; i < datos.length;  i++){
        // Dibujar barras
        ctx.beginPath();
        ctx.rect(x, 500 - datos[i], width, datos[i]); //x, y, ancho, alto
        ctx.fillStyle = colores[i];
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = colores[i];
        ctx.fillText(
            porcentajes[i] + "%",
            x + width / 2, // centro de la barra
            500 - datos[i] - 5 // un poco arriba de la barra
        );

        x += width + 20; //espacio entre barras


    }
</script>

</body>
</html>
